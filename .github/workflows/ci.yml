name: Cpp CI

on:
  push:
    branches:
      - main

jobs:
  build-and-sonar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compile
        run: g++ Wordle.cpp -o app

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN}}
        with:
          args: >
            -Dsonar.projectKey=Saifelden12_Wordle
            -Dsonar.organization=saifelden12
